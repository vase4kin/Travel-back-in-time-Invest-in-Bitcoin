name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # Job to build android sources
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Set up JDK
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Build app and run checks
      run: >-
        ./gradlew
        assembleDebug
        testDebugUnitTest
        :app:verifyRoborazziDebug
        lintDebug
        detekt
        spotlessCheck
        :app:compileDebugAndroidTestKotlin

    - name: Validate release build
      if: github.event_name == 'push'
      run: ./gradlew :app:assembleRelease -x :app:uploadCrashlyticsMappingFileRelease
    
    - name: Upload build outputs
      if: success()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: build-outputs
        path: app/build/outputs/
        compression-level: 0
        retention-days: 7

    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: reports
        if-no-files-found: ignore
        path: |
          **/build/reports/**
          **/build/test-results/**
          app/build/outputs/roborazzi/
        retention-days: 7

  # Job to detect iOS app changes
  detect-ios-app-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      iosApp: ${{ steps.filter.outputs.iosApp }}

    steps:

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
      id: filter
      with:
        filters: |
          iosApp:
            - 'iosApp/**'
            - 'shared-libraries/**'
            - 'build-logic/**'
            - 'gradle/**'
            - 'settings.gradle.kts'
            - 'build.gradle.kts'

  # Job to build iOS app sources
  build-ios:
    needs: detect-ios-app-changes
#    if: ${{ needs.detect-ios-app-changes.outputs.iosApp == 'true' }}
    if: false
    runs-on: macOS-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up JDK
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Build KMP framework and install pods
      run: ./gradlew podInstall --no-configuration-cache

    - name: Build iOS app
      working-directory: iosApp
      run: sh build.sh
